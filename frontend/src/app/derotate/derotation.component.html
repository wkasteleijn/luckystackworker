<div class="popup-container">
  <h2 class="{{ nightMode ? 'titleNight' : 'title' }}">De-rotate</h2>
  <button (click)="closePopup()" class="closeButton" matTooltip="Close panel">
    <img src="assets/images/close.png" class="buttonImg" />
  </button>

  @if (showWarning()) {
    <div class="{{ nightMode ? 'titleNight' : 'title' }}">
      Select either a reference image or enter a reference time.
    </div>
  }
  @if (showInvalidTimeWarning()) {
    <div class="{{ nightMode ? 'titleNight' : 'title' }}">
      Enter a valid reference time.
    </div>
  }
  @if (!showWarning() && !showInvalidTimeWarning()) {
    <div class="slidersStartMargin"></div>
  }

  <div class="sliderContainer">
    <div class="sliderGroupFileSelector">
      <label class="sliderLabel">Reference image</label>
      <select
        matNativeControl
        [(ngModel)]="referenceImage"
        matTooltip="Select the reference image to which the other images will be de-rotated to"
        class="{{
          'derotationDropdown dropdown ' +
            (nightMode ? 'activeColorNight' : 'activeColor')
        }}"
        (change)="onRefImageChanged()"
      >
        <option [value]=""></option>
        @for (image of deRotation.images; track image) {
          <option [value]="image">
            {{ image }}
          </option>
        }
      </select>
    </div>
    <div class="referenceTimeInput">
      <label class="sliderLabel">Reference time</label>
      <div>
        H
        <input
          matInput
          type="number"
          min="0"
          max="23"
          [(ngModel)]="referenceHour"
          class="timeInput"
        />
        : M
        <input
          matInput
          type="number"
          min="0"
          max="59"
          [(ngModel)]="referenceMinute"
          class="timeInput"
        />
        : S
        <input
          matInput
          type="number"
          min="0"
          max="59"
          [(ngModel)]="referenceSecond"
          class="timeInput"
        />
      </div>
    </div>

    <app-slider
      [sliderLabel]="'Detail anchor strength'"
      [sliderValue]="deRotation.anchorStrength"
      [sliderStep]="1"
      [sliderMinValue]="1"
      [sliderMaxValue]="10"
      [nightMode]="nightMode"
      (sliderValueChanged)="onAnchorStrengthChanged($event)"
    ></app-slider>
    <app-slider
      [sliderLabel]="'Noise robustness'"
      [sliderValue]="deRotation.noiseRobustness"
      [sliderStep]="1"
      [sliderMinValue]="1"
      [sliderMaxValue]="5"
      [nightMode]="nightMode"
      (sliderValueChanged)="onNoiseRobustnessChanged($event)"
    ></app-slider>
    <app-slider
      [sliderLabel]="'Accuracy'"
      [sliderValue]="deRotation.accurateness"
      [sliderStep]="1"
      [sliderMinValue]="1"
      [sliderMaxValue]="4"
      [nightMode]="nightMode"
      (sliderValueChanged)="onAccuratenessChanged($event)"
    ></app-slider>
    <mat-checkbox
      [(ngModel)]="deRotation.lowSNRData"
      (change)="onLowSNRDataChanged($event)"
      [color]="colorTheme()"
      class="lowSNRData"
      >Low signal-to-noise ratio data</mat-checkbox
    >

    <button
      type="button"
      mat-button
      (click)="onStart()"
      class="button startButton {{
        nightMode ? 'activeColorNight' : 'activeColor'
      }}"
      matTooltip="Start de-rotating the selected images."
    >
      <img src="assets/images/startbatch.png" class="startButtonImg" />
    </button>
  </div>
</div>
